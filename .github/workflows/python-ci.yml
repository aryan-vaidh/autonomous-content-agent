name: Python CI Pipeline

# 1. Triggers: When should this pipeline run?
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    # 2. Environment: What OS will run the code?
    runs-on: ubuntu-latest

    steps:
    # 3. Checkout: Pulls your code from the GitHub repository
    - name: Checkout repository
      uses: actions/checkout@v4

    # 4. Setup Python: Installs the specified Python version
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10" # Adjust to match your local version
        cache: 'pip' # Speeds up future builds

    # 5. Dependencies: Installs your required packages
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install packages from requirements.txt if it exists
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # Install testing and linting tools
        pip install flake8 pytest

    # 6. Linting: Checks for syntax errors and bad coding practices
    - name: Lint with flake8
      run: |
        # Stop the build if there are critical Python syntax errors
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Treat other formatting issues as warnings (exit-zero)
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    # 7. Testing: Runs your automated tests
    - name: Test with pytest
      run: |
        # Runs any files starting with test_*.py
        pytest